version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: frotas_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: frotas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frotas_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: frotas_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@frotas.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - frotas_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: frotas_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_password
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - frotas_network

  api_backend:
    build: 
      context: ./backend
    container_name: frotas_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin_password
    depends_on:
      - rabbitmq
    networks:
      - frotas_network

  worker:
    build:
      context: ./worker
    container_name: frotas_worker
    restart: always
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin_password
      - POSTGRES_HOST=postgres_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_DB=frotas_db
    depends_on:
      - rabbitmq
      - postgres_db
    networks:
      - frotas_network

  # ---> NOSSO DASHBOARD (Agora alinhado corretamente dentro de services) <---
  frontend_dashboard:
    build:
      context: ./frontend
    container_name: frotas_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      - POSTGRES_HOST=postgres_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_DB=frotas_db
    depends_on:
      - postgres_db
    networks:
      - frotas_network

# As chaves globais abaixo ficam totalmente à esquerda (sem indentação)
volumes:
  postgres_data:

networks:
  frotas_network:
    driver: bridge